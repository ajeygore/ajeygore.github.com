<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO Game</title>
<style>
  :root {
    --bg: #0f1226;
    --panel: #1a1e3a;
    --accent: #6c5ce7;
    --accent-2: #00cec9;
    --text: #f5f6fa;
    --muted: #9aa0c0;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #2a2f5a, var(--bg));
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 560px;
    background: var(--panel);
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,.45);
    border: 1px solid rgba(255,255,255,.06);
  }
  h1 {
    font-size: 28px;
    letter-spacing: .5px;
    margin-bottom: 4px;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .count { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .count b { color: var(--accent-2); }
  label { display: block; color: var(--muted); font-size: 14px; margin-bottom: 8px; }

  .entry { display: flex; gap: 10px; margin-bottom: 18px; }
  input[type="text"] {
    flex: 1;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.04);
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border .2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  button {
    border: none;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .1s, opacity .2s, background .2s;
    color: #fff;
  }
  button:active { transform: scale(.96); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-add { background: var(--accent); }
  .btn-primary { background: linear-gradient(90deg, var(--accent-2), var(--accent)); width: 100%; padding: 16px; font-size: 16px; }
  .btn-reveal { background: linear-gradient(90deg, var(--accent-2), var(--accent)); width: 100%; padding: 18px; font-size: 18px; margin-top: 20px; }
  .btn-ghost {
    background: transparent;
    border: 1px solid rgba(255,255,255,.15);
    color: var(--muted);
    padding: 10px 14px;
    font-size: 13px;
  }

  .roster { list-style: none; margin-bottom: 18px; }
  .roster li {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px;
    background: rgba(255,255,255,.04); margin-bottom: 8px; font-size: 15px;
  }
  .roster .num { width: 24px; height: 24px; flex: 0 0 24px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .roster .rm { margin-left: auto; background: transparent; border: none; color: var(--danger); font-size: 18px; padding: 0 6px; cursor: pointer; }
  .roster .empty { color: var(--muted); font-style: italic; background: none; }

  .status {
    background: rgba(108,92,231,.12);
    border: 1px dashed rgba(108,92,231,.5);
    border-radius: 14px;
    padding: 28px 20px;
    text-align: center;
    color: var(--muted);
  }
  .status .big { font-size: 40px; margin-bottom: 8px; }
  .status .player-name { color: var(--accent-2); font-weight: 700; font-size: 22px; display: block; margin-bottom: 6px; }
  .status .added-flash { color: var(--accent-2); font-weight: 600; }

  .progress { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,.12); }
  .dot.done { background: var(--accent-2); }
  .dot.current { background: var(--accent); box-shadow: 0 0 0 3px rgba(108,92,231,.3); }

  .names { list-style: none; }
  .names li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,.04);
    margin-bottom: 10px;
    font-size: 17px;
    animation: pop .35s ease both;
  }
  .names li .num {
    width: 28px; height: 28px;
    flex: 0 0 28px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(12px) scale(.95); }
    to { opacity: 1; transform: none; }
  }

  .actions { display: flex; gap: 10px; margin-top: 20px; }
  .actions button { flex: 1; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="app">
    <h1>👔 CEO Game</h1>
    <p class="subtitle">Each player secretly enters a name. Only the last player reveals them all.</p>

    <!-- SETUP PHASE -->
    <div id="setupPhase">
      <label for="playerName">Add players</label>
      <div class="entry">
        <input type="text" id="playerName" placeholder="Player name, then Enter" autocomplete="off">
        <button class="btn-add" id="addPlayerBtn">Add</button>
      </div>
      <ul class="roster" id="rosterList"></ul>
      <button class="btn-primary" id="startBtn" disabled>Start Game</button>
    </div>

    <!-- ENTRY PHASE -->
    <div id="entryPhase" class="hidden">
      <div class="progress" id="progress"></div>
      <p class="count">Turn <b id="turnNum">1</b> of <b id="turnTotal">0</b></p>

      <div class="status" id="turnBox">
        <div class="big">🤫</div>
        <span class="player-name" id="turnName">Player</span>
        <div id="statusText">Enter a name, then pass the device to the next player.</div>
      </div>

      <div class="entry" id="entryRow" style="margin-top:18px;">
        <input type="text" id="nameInput" placeholder="Type a name, then press Enter" autocomplete="off">
        <button class="btn-add" id="addBtn">Add</button>
      </div>

      <button class="btn-reveal hidden" id="revealBtn">🎉 Reveal All Names</button>

      <div class="actions">
        <button class="btn-ghost" id="resetBtn">Reset Game</button>
      </div>
    </div>

    <!-- REVEAL PHASE -->
    <div id="revealPhase" class="hidden">
      <p class="count">The reveal — <b id="revealCount">0</b> name(s)</p>
      <ul class="names" id="namesList"></ul>
      <div class="actions">
        <button class="btn-ghost" id="resetBtn2">New Game</button>
      </div>
    </div>
  </div>

<script>
  const KEY = 'ceo-game-state-v2';
  const $ = id => document.getElementById(id);

  // state: { players: [names of people], entries: [secret names typed] }
  let state = load();

  function load() {
    try {
      const s = JSON.parse(localStorage.getItem(KEY));
      if (s && Array.isArray(s.players) && Array.isArray(s.entries)) return s;
    } catch (e) {}
    return { players: [], entries: [] };
  }
  function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
  function clearState() { state = { players: [], entries: [] }; localStorage.removeItem(KEY); }

  function show(phase) {
    ['setupPhase', 'entryPhase', 'revealPhase'].forEach(p =>
      $(p).classList.toggle('hidden', p !== phase));
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ---------- Setup ---------- */
  function renderRoster() {
    const ul = $('rosterList');
    ul.innerHTML = '';
    if (!state.players.length) {
      ul.innerHTML = '<li class="empty">No players yet — add at least 2.</li>';
    } else {
      state.players.forEach((name, i) => {
        const li = document.createElement('li');
        li.innerHTML = '<span class="num">' + (i + 1) + '</span><span>' + escapeHtml(name) +
          '</span><button class="rm" data-i="' + i + '" title="Remove">×</button>';
        ul.appendChild(li);
      });
    }
    $('startBtn').disabled = state.players.length < 2;
  }

  function addPlayer() {
    const v = $('playerName').value.trim();
    if (!v) return;
    state.players.push(v);
    save();
    $('playerName').value = '';
    $('playerName').focus();
    renderRoster();
  }

  $('rosterList').addEventListener('click', e => {
    const btn = e.target.closest('.rm');
    if (!btn) return;
    state.players.splice(parseInt(btn.dataset.i, 10), 1);
    save();
    renderRoster();
  });

  function startGame() {
    if (state.players.length < 2) return;
    state.entries = [];
    save();
    renderEntry();
    show('entryPhase');
    $('nameInput').focus();
  }

  /* ---------- Entry ---------- */
  function renderEntry() {
    const total = state.players.length;
    const done = state.entries.length;
    $('turnTotal').textContent = total;
    $('turnNum').textContent = Math.min(done + 1, total);

    const prog = $('progress');
    prog.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < done ? ' done' : i === done ? ' current' : '');
      prog.appendChild(d);
    }

    const allIn = done >= total;
    $('entryRow').classList.toggle('hidden', allIn);
    $('revealBtn').classList.toggle('hidden', !allIn);

    if (allIn) {
      $('turnName').textContent = 'All players are in!';
      $('statusText').innerHTML = '<span class="added-flash">Ready.</span> Last player — tap reveal.';
    } else {
      $('turnName').textContent = state.players[done] + ', your turn';
      $('statusText').textContent = 'Enter a name secretly, then pass the device.';
    }
  }

  function addName() {
    if (state.entries.length >= state.players.length) return;
    const val = $('nameInput').value.trim();
    if (!val) return;
    state.entries.push(val);
    save();
    $('nameInput').value = '';
    renderEntry();
    if (state.entries.length < state.players.length) $('nameInput').focus();
  }

  /* ---------- Reveal (names only, no player attribution) ---------- */
  function reveal() {
    const list = $('namesList');
    list.innerHTML = '';
    const shuffled = [...state.entries].sort(() => Math.random() - 0.5);
    shuffled.forEach((name, i) => {
      const li = document.createElement('li');
      li.style.animationDelay = (i * 0.08) + 's';
      li.innerHTML = '<span class="num">' + (i + 1) + '</span><span>' + escapeHtml(name) + '</span>';
      list.appendChild(li);
    });
    $('revealCount').textContent = state.entries.length;
    show('revealPhase');
  }

  function reset() {
    if (state.entries.length && !confirm('Clear everything and start a new game?')) return;
    clearState();
    renderRoster();
    show('setupPhase');
    $('playerName').focus();
  }

  /* ---------- Wiring ---------- */
  $('addPlayerBtn').addEventListener('click', addPlayer);
  $('playerName').addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });
  $('startBtn').addEventListener('click', startGame);
  $('addBtn').addEventListener('click', addName);
  $('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') addName(); });
  $('revealBtn').addEventListener('click', reveal);
  $('resetBtn').addEventListener('click', reset);
  $('resetBtn2').addEventListener('click', reset);

  // Restore
  renderRoster();
  if (state.players.length >= 2 && state.entries.length > 0) {
    renderEntry();
    show('entryPhase');
  } else {
    show('setupPhase');
  }
</script>
</body>
</html>
