<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO Game</title>
<style>
  :root {
    --bg: #0f1226;
    --panel: #1a1e3a;
    --accent: #6c5ce7;
    --accent-2: #00cec9;
    --text: #f5f6fa;
    --muted: #9aa0c0;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #2a2f5a, var(--bg));
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 560px;
    background: var(--panel);
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,.45);
    border: 1px solid rgba(255,255,255,.06);
  }
  h1 {
    font-size: 28px;
    letter-spacing: .5px;
    margin-bottom: 4px;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .count { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .count b { color: var(--accent-2); }

  label { display: block; color: var(--muted); font-size: 14px; margin-bottom: 8px; }

  .entry { display: flex; gap: 10px; margin-bottom: 18px; }
  input[type="text"], input[type="number"] {
    flex: 1;
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.04);
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border .2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  button {
    border: none;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .1s, opacity .2s, background .2s;
    color: #fff;
  }
  button:active { transform: scale(.96); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-add { background: var(--accent); }
  .btn-primary { background: linear-gradient(90deg, var(--accent-2), var(--accent)); width: 100%; padding: 16px; font-size: 16px; }
  .btn-reveal { background: linear-gradient(90deg, var(--accent-2), var(--accent)); width: 100%; padding: 18px; font-size: 18px; margin-top: 20px; }
  .btn-ghost {
    background: transparent;
    border: 1px solid rgba(255,255,255,.15);
    color: var(--muted);
    padding: 10px 14px;
    font-size: 13px;
  }

  .status {
    background: rgba(108,92,231,.12);
    border: 1px dashed rgba(108,92,231,.5);
    border-radius: 14px;
    padding: 28px 20px;
    text-align: center;
    color: var(--muted);
  }
  .status .big { font-size: 40px; margin-bottom: 8px; }
  .status .added-flash { color: var(--accent-2); font-weight: 600; }

  .progress { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,.12); }
  .dot.done { background: var(--accent-2); }
  .dot.current { background: var(--accent); box-shadow: 0 0 0 3px rgba(108,92,231,.3); }

  .names { list-style: none; }
  .names li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,.04);
    margin-bottom: 10px;
    font-size: 17px;
    animation: pop .35s ease both;
  }
  .names li .num {
    width: 28px; height: 28px;
    flex: 0 0 28px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(12px) scale(.95); }
    to { opacity: 1; transform: none; }
  }

  .actions { display: flex; gap: 10px; margin-top: 20px; }
  .actions button { flex: 1; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="app">
    <h1>👔 CEO Game</h1>
    <p class="subtitle">Everyone secretly enters a name. Only the last player reveals them all.</p>

    <!-- SETUP PHASE -->
    <div id="setupPhase">
      <label for="playerCount">How many players?</label>
      <input type="number" id="playerCount" min="2" max="50" value="4" inputmode="numeric">
      <button class="btn-primary" id="startBtn" style="margin-top:16px;">Start Game</button>
    </div>

    <!-- ENTRY PHASE -->
    <div id="entryPhase" class="hidden">
      <div class="progress" id="progress"></div>
      <p class="count">Player <b id="currentPlayer">1</b> of <b id="totalPlayers">0</b></p>

      <div class="entry">
        <input type="text" id="nameInput" placeholder="Type your name, then press Enter" autocomplete="off">
        <button class="btn-add" id="addBtn">Add</button>
      </div>

      <div class="status">
        <div class="big">🤫</div>
        <div id="statusText">Enter a name, then pass the device to the next player.</div>
      </div>

      <button class="btn-reveal hidden" id="revealBtn">🎉 Reveal All Names</button>

      <div class="actions">
        <button class="btn-ghost" id="resetBtn">Reset Game</button>
      </div>
    </div>

    <!-- REVEAL PHASE -->
    <div id="revealPhase" class="hidden">
      <p class="count">The reveal — <b id="revealCount">0</b> name(s)</p>
      <ul class="names" id="namesList"></ul>
      <div class="actions">
        <button class="btn-ghost" id="resetBtn2">New Game</button>
      </div>
    </div>
  </div>

<script>
  const KEY = 'ceo-game-state';
  const $ = id => document.getElementById(id);

  let state = load();

  function load() {
    try {
      const s = JSON.parse(localStorage.getItem(KEY));
      if (s && Array.isArray(s.names) && typeof s.total === 'number') return s;
    } catch (e) {}
    return { total: 0, names: [] };
  }
  function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
  function clearState() {
    state = { total: 0, names: [] };
    localStorage.removeItem(KEY);
  }

  function show(phase) {
    ['setupPhase', 'entryPhase', 'revealPhase'].forEach(p =>
      $(p).classList.toggle('hidden', p !== phase));
  }

  function startGame() {
    const n = parseInt($('playerCount').value, 10);
    if (!n || n < 2) { alert('Enter at least 2 players.'); return; }
    state = { total: n, names: [] };
    save();
    renderEntry();
    show('entryPhase');
    $('nameInput').focus();
  }

  function renderEntry() {
    const { total, names } = state;
    $('totalPlayers').textContent = total;
    $('currentPlayer').textContent = Math.min(names.length + 1, total);

    const prog = $('progress');
    prog.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < names.length ? ' done' : i === names.length ? ' current' : '');
      prog.appendChild(d);
    }

    const allIn = names.length >= total;
    $('nameInput').classList.toggle('hidden', allIn);
    $('addBtn').classList.toggle('hidden', allIn);
    $('revealBtn').classList.toggle('hidden', !allIn);

    if (allIn) {
      $('statusText').innerHTML = '<span class="added-flash">All players are in!</span> Last player — tap reveal.';
    }
  }

  function addName() {
    if (state.names.length >= state.total) return;
    const val = $('nameInput').value.trim();
    if (!val) return;
    state.names.push(val);
    save();
    $('nameInput').value = '';
    renderEntry();
    if (state.names.length < state.total) {
      $('statusText').innerHTML = '<span class="added-flash">✓ Saved!</span> Pass the device to player ' + (state.names.length + 1) + '.';
      $('nameInput').focus();
    }
  }

  function reveal() {
    const list = $('namesList');
    list.innerHTML = '';
    const shuffled = [...state.names].sort(() => Math.random() - 0.5);
    shuffled.forEach((name, i) => {
      const li = document.createElement('li');
      li.style.animationDelay = (i * 0.08) + 's';
      li.innerHTML = '<span class="num">' + (i + 1) + '</span><span>' + escapeHtml(name) + '</span>';
      list.appendChild(li);
    });
    $('revealCount').textContent = state.names.length;
    show('revealPhase');
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function reset() {
    if (state.names.length && !confirm('Clear everything and start a new game?')) return;
    clearState();
    $('playerCount').value = 4;
    show('setupPhase');
    $('playerCount').focus();
  }

  $('startBtn').addEventListener('click', startGame);
  $('playerCount').addEventListener('keydown', e => { if (e.key === 'Enter') startGame(); });
  $('addBtn').addEventListener('click', addName);
  $('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') addName(); });
  $('revealBtn').addEventListener('click', reveal);
  $('resetBtn').addEventListener('click', reset);
  $('resetBtn2').addEventListener('click', reset);

  // Restore on load
  if (state.total > 0 && state.names.length < state.total) {
    renderEntry();
    show('entryPhase');
  } else if (state.total > 0 && state.names.length >= state.total) {
    renderEntry();
    show('entryPhase'); // sits on the "ready to reveal" screen
  } else {
    show('setupPhase');
  }
</script>
</body>
</html>
