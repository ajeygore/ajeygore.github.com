<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;overflow:hidden;background:#fafafa;}
  .card{position:relative;width:1200px;height:630px;background:#fafafa;font-family:Georgia,'Times New Roman',serif;}
  .left{position:absolute;top:0;left:0;width:460px;height:630px;background:#1a1a1a;overflow:hidden;}
  .left img{width:100%;height:100%;object-fit:cover;object-position:center 18%;display:block;filter:grayscale(1) contrast(1.04);}
  .right{position:absolute;top:0;left:460px;width:740px;height:630px;}
  .top{position:absolute;top:78px;left:60px;right:60px;}
  .divider{display:block;width:64px;height:auto;margin-bottom:30px;}
  .title{color:#111;font-style:italic;font-weight:400;letter-spacing:-0.012em;}
  .title.s1{font-size:64px;line-height:1.1;}
  .title.s2{font-size:50px;line-height:1.14;}
  .title.s3{font-size:38px;line-height:1.18;}
  .squiggle{position:absolute;left:60px;bottom:128px;width:120px;height:auto;opacity:0.85;}
  .bot{position:absolute;bottom:60px;left:60px;right:60px;display:flex;justify-content:space-between;align-items:flex-end;}
  .name{color:#111;font-weight:700;font-size:22px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif;letter-spacing:0.1em;text-transform:uppercase;font-style:normal;}
  .url{color:#888;font-size:20px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif;letter-spacing:0.04em;font-style:normal;}
</style>
</head>
<body>
  <div class="card">
    <div class="left"><img src="{{IMAGE_PATH}}" alt=""/></div>
    <div class="right">
      <div class="top">
        <svg class="divider" viewBox="0 0 64 6" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <path d="M1 3 Q 16 0 32 3 T 63 3" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <div class="title {{TITLE_CLASS}}">{{TITLE}}</div>
      </div>
      <svg class="squiggle" viewBox="0 0 120 28" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 14 Q 12 4 22 14 T 42 14 T 62 14 T 82 14 T 102 14 T 118 14" fill="none" stroke="#c8a572" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      <div class="bot">
        <div class="name">Ajey Gore</div>
        <div class="url">ajeygore.com</div>
      </div>
    </div>
  </div>
</body>
</html>
